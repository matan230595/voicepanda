<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pandavoice">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#10b981">
    
    <title>Pandavoice Cloud</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐼</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%2310b981%22/><text x=%2250%22 y=%2250%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2260%22>🐼</text></svg>">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #10b981; 
            --primary-bg: #ecfdf5;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f3f4f6;
            --card: #ffffff;
            --danger: #ef4444;
            --whatsapp: #25D366;
            --radius: 24px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --primary: #34d399;
            --primary-bg: #064e3b;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border: #374151;
            --bg: #111827;
            --card: #1f2937;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body {
            margin: 0; padding: 15px;
            background: var(--bg); color: var(--text-main);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .app-container {
            background: var(--card);
            width: 100%; max-width: 500px; height: 100%; max-height: 900px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            border: 1px solid var(--border);
        }

        /* אייקונים */
        svg { width: 24px; height: 24px; display: block; }
        .icon-stroke { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-fill { fill: currentColor; stroke: none; }

        /* Header */
        header {
            padding: 15px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card); z-index: 10;
        }
        
        /* התיקון שהיה חסר: סידור הכפתורים בשורה */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand { font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--primary); }
        
        .btn-icon {
            width: 40px; height: 40px; border-radius: 12px;
            border: 1px solid var(--border); background: transparent; color: var(--text-muted);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .btn-icon:hover { color: var(--primary); border-color: var(--primary); background: var(--bg); }
        .btn-font { font-size: 0.9rem; font-weight: 700; width: 36px; }

        /* Toolbar */
        .toolbar { padding: 12px; display: flex; gap: 10px; background: var(--bg); }
        .tool-btn {
            flex: 1; border: none; padding: 12px; border-radius: 12px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 0.9rem; transition: 0.2s;
        }
        .btn-ai { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-tts { background: var(--card); color: var(--text-main); border: 1px solid var(--border); }
        .tool-btn:active { transform: scale(0.96); }

        /* Main */
        main { flex: 1; position: relative; display: flex; flex-direction: column; background: var(--card); }
        
        textarea {
            flex: 1; width: 100%; border: none; padding: 20px; padding-bottom: 120px;
            font-size: 1.2rem; line-height: 1.5; resize: none; outline: none;
            background: transparent; color: var(--text-main);
        }

        /* Mic */
        .mic-wrapper {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; justify-content: center; align-items: center; z-index: 5;
        }
        .mic-btn {
            width: 72px; height: 72px; border-radius: 50%;
            background: var(--text-main); color: white; border: 4px solid var(--card);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; z-index: 2;
        }
        .mic-btn svg { width: 32px; height: 32px; }
        
        .recording .mic-btn { background: var(--danger); transform: scale(1.1); }
        .mic-ring {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: var(--danger); opacity: 0; z-index: 1;
        }
        .recording .mic-ring { animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(2.2); opacity: 0; } }

        /* Footer */
        footer {
            padding: 10px; border-top: 1px solid var(--border); background: var(--card);
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            background: none; border: none; cursor: pointer; color: var(--text-muted);
            padding: 8px 0; border-radius: 8px;
        }
        .nav-item:active { background: var(--bg); }
        .nav-item span { font-size: 0.7rem; font-weight: 600; }
        .whatsapp { color: var(--whatsapp); }

        /* Cloud Indicator */
        .cloud-status {
            position: absolute; top: 10px; left: 10px; font-size: 0.7rem; 
            display: flex; align-items: center; gap: 4px; color: var(--text-muted);
            background: var(--bg); padding: 4px 8px; border-radius: 20px; opacity: 0; transition: 0.3s;
        }
        .cloud-status.show { opacity: 1; }
        .cloud-status.saved { color: var(--primary); }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(3px); }
        .modal.open { display: flex; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 24px; width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); }
        .save-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; }

    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-actions">
            <button class="btn-icon" onclick="toggleSettings()">
                <svg class="icon-stroke" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
            <button class="btn-icon" onclick="toggleTheme()">
                <svg class="icon-stroke" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
        <div class="brand">🐼 <span>Pandavoice</span></div>
        <div class="header-actions">
            <button class="btn-icon btn-font" onclick="changeSize(2)">A+</button>
            <button class="btn-icon btn-font" onclick="changeSize(-2)">A-</button>
        </div>
    </header>

    <div class="toolbar">
        <button class="tool-btn btn-ai" onclick="runAI(this)">
            <svg class="icon-stroke" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            סדר לי (AI)
        </button>
        <button class="tool-btn btn-tts" onclick="speakText()">
            <svg class="icon-stroke" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            הקרא
        </button>
    </div>

    <main>
        <div id="cloudStatus" class="cloud-status">
            <svg class="icon-stroke" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            נשמר בענן
        </div>
        <textarea id="output" placeholder="לחץ על המיקרופון כדי להתחיל..." dir="rtl"></textarea>
        
        <div class="mic-wrapper">
            <div class="mic-ring"></div>
            <button class="mic-btn" id="recordBtn">
                <svg class="icon-stroke" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
        </div>
    </main>

    <footer>
        <button class="nav-item" onclick="clearText(true)">
            <svg class="icon-stroke" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            <span>חדש</span>
        </button>
        <button class="nav-item" onclick="copyText(this)">
            <svg class="icon-stroke" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            <span>העתק</span>
        </button>
        <button class="nav-item" onclick="saveFile()">
            <svg class="icon-stroke" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            <span>שמור</span>
        </button>
        <button class="nav-item whatsapp" onclick="sendWhatsapp()">
            <svg class="icon-fill" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.008-.57-.008-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
            <span>וואטסאפ</span>
        </button>
    </footer>
</div>

<div id="settingsModal" class="modal" onclick="if(event.target===this) toggleSettings()">
    <div class="modal-box">
        <h3 style="margin-top:0">הגדרות פנדה</h3>
        <p style="font-size:0.9rem; color:#666">כדי שהשמירה בענן תעבוד, הזן את פרטי ה-Firebase שלך:</p>
        
        <input type="text" id="fbApiKey" placeholder="Firebase API Key">
        <input type="text" id="fbAuthDomain" placeholder="Auth Domain">
        <input type="text" id="fbProjectId" placeholder="Project ID">
        
        <hr style="border:0; border-top:1px solid #eee; margin:20px 0">
        
        <p style="font-size:0.9rem; color:#666">מפתח Gemini (עבור ה-AI):</p>
        <input type="password" id="aiApiKey" placeholder="Gemini API Key">
        
        <button class="save-btn" onclick="saveSettings()">שמור הגדרות</button>
    </div>
</div>

<script>
    // --- משתנים גלובליים ---
    let db = null;
    let recognition;
    let isRecording = false;
    let currentSize = 20;
    const output = document.getElementById('output');
    const cloudStatus = document.getElementById('cloudStatus');
    
    // --- אתחול המערכת ---
    window.onload = () => {
        const theme = localStorage.getItem('theme');
        if(theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        
        const draft = localStorage.getItem('draft');
        if(draft) output.value = draft;

        initFirebase();
    };

    // --- Firebase Logic (שמירה אוטומטית לענן) ---
    function initFirebase() {
        const apiKey = localStorage.getItem('fbApiKey');
        const projectId = localStorage.getItem('fbProjectId');
        
        if (apiKey && projectId) {
            const firebaseConfig = {
                apiKey: apiKey,
                authDomain: localStorage.getItem('fbAuthDomain'),
                projectId: projectId
            };
            
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                db = firebase.firestore();
                console.log("Firebase Connected");
            } catch (e) {
                console.error("Firebase Error", e);
            }
        }
    }

    function saveToCloud(text) {
        if (!db || !text || text.length < 5) return;
        
        cloudStatus.classList.add('show');
        cloudStatus.innerText = "שומר לענן...";
        
        let userId = localStorage.getItem('userId');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('userId', userId);
        }

        db.collection('notes').add({
            userId: userId,
            text: text,
            date: new Date(),
            device: /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop'
        }).then(() => {
            cloudStatus.innerText = "✔ נשמר בענן";
            cloudStatus.classList.add('saved');
            setTimeout(() => cloudStatus.classList.remove('show'), 2000);
        }).catch((err) => {
            console.error("Cloud Save Error", err);
            cloudStatus.innerText = "שגיאת שמירה";
        });
    }

    // --- Speech Recognition ---
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'he-IL';

        recognition.onstart = () => {
            isRecording = true;
            document.body.classList.add('recording');
            playBeep('start');
        };

        recognition.onend = () => {
            isRecording = false;
            document.body.classList.remove('recording');
            playBeep('end');
            saveToCloud(output.value);
        };

        recognition.onresult = (event) => {
            let final = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) final += event.results[i][0].transcript;
            }
            if (final) {
                final = final.replace(/נקודה/g, ".").replace(/פסיק/g, ",");
                const prefix = (output.value && !output.value.endsWith('\n')) ? ' ' : '';
                output.value += prefix + final;
                localStorage.setItem('draft', output.value);
                output.scrollTop = output.scrollHeight;
            }
        };

        document.getElementById('recordBtn').onclick = () => {
            if (isRecording) recognition.stop(); else recognition.start();
        };
    } else {
        alert("דפדפן זה לא תומך בדיבור. באייפון השתמש ב-Safari (יש ללחוץ ידנית על המיקרופון), באנדרואיד ב-Chrome.");
    }

    // --- AI Logic ---
    async function runAI(btn) {
        const text = output.value;
        const apiKey = localStorage.getItem('aiApiKey');
        
        if(!apiKey) return toggleSettings();
        if(!text) return;

        const orgHtml = btn.innerHTML;
        btn.innerHTML = "חושב...";
        btn.disabled = true;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text: `Fix Hebrew text punctuation/grammar: ${text}` }] }] })
            });
            const data = await res.json();
            if(data.candidates) {
                output.value = data.candidates[0].content.parts[0].text.trim();
                localStorage.setItem('draft', output.value);
                saveToCloud(output.value);
            }
        } catch(e) {
            alert("שגיאת AI");
        } finally {
            btn.innerHTML = orgHtml;
            btn.disabled = false;
        }
    }

    // --- Helpers ---
    function toggleSettings() {
        const el = document.getElementById('settingsModal');
        el.classList.toggle('open');
        if(el.classList.contains('open')) {
            document.getElementById('fbApiKey').value = localStorage.getItem('fbApiKey') || '';
            document.getElementById('fbAuthDomain').value = localStorage.getItem('fbAuthDomain') || '';
            document.getElementById('fbProjectId').value = localStorage.getItem('fbProjectId') || '';
            document.getElementById('aiApiKey').value = localStorage.getItem('aiApiKey') || '';
        }
    }

    function saveSettings() {
        localStorage.setItem('fbApiKey', document.getElementById('fbApiKey').value.trim());
        localStorage.setItem('fbAuthDomain', document.getElementById('fbAuthDomain').value.trim());
        localStorage.setItem('fbProjectId', document.getElementById('fbProjectId').value.trim());
        localStorage.setItem('aiApiKey', document.getElementById('aiApiKey').value.trim());
        toggleSettings();
        initFirebase();
        alert("הגדרות נשמרו! רענן את הדף.");
    }

    function toggleTheme() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    function changeSize(d) {
        currentSize = Math.max(16, Math.min(32, currentSize + d));
        output.style.fontSize = `${currentSize}px`;
    }

    function clearText(conf) {
        if(conf && !confirm("למחוק?")) return;
        output.value = ""; localStorage.setItem('draft', "");
    }

    function copyText(btn) {
        navigator.clipboard.writeText(output.value);
        const s = btn.querySelector('span'); const o = s.innerText;
        s.innerText = "הועתק"; setTimeout(()=>s.innerText=o, 1500);
    }

    function saveFile() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([output.value], {type:'text/plain'}));
        a.download = `Note_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
    }

    function sendWhatsapp() {
        window.open(`https://wa.me/?text=${encodeURIComponent(output.value)}`);
    }

    function speakText() {
        const u = new SpeechSynthesisUtterance(output.value); u.lang='he-IL';
        window.speechSynthesis.speak(u);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine'; o.frequency.value = type==='start'?600:400;
        g.gain.value=0.1; o.start(); o.stop(audioCtx.currentTime+0.1);
    }
</script>

</body>
</html>
